template: cloud-deploy-sme
priority: P2-high
project_id: "boutique-demo-22"
project_number: "258519306384"
region: "us-central1"

resources:
  - name: "alt-frontend-demo"
    type: "Cloud Deploy Delivery Pipeline"
    identifier: "projects/boutique-demo-22/locations/us-central1/deliveryPipelines/alt-frontend-demo"
    description: "Main application pipeline"
    uid: "5d8fbe06052643a5bf56e5f90d0ce239"
